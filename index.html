<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>효종갱 파주 출퇴근</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a2d18">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div id="register" class="card">

    <div class="title">효종갱</div>

    <div class="sub">
      신세계파주프리미엄아울렛점 직원등록
    </div>

    <input id="name"
           placeholder="이름">

    <input id="phone"
           placeholder="전화번호">

    <button class="btn-main"
            onclick="register()">
      등록하기
    </button>

    <div id="regMsg"
         class="status"></div>

  </div>

  <div id="main"
       class="card"
       style="display:none;">

    <div class="title">출퇴근</div>

    <div id="userName"
         class="sub"></div>

    <button id="inBtn"
            class="btn-in"
            onclick="send('출근')">
      출근
    </button>

    <button id="outBtn"
            class="btn-out"
            onclick="send('퇴근')">
      퇴근
    </button>

    <button class="btn-reset"
            onclick="reset()">
      직원 정보 다시 등록
    </button>

    <div id="msg"
         class="status"></div>

  </div>

</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
